{{- $giscus := site.Params.giscus -}}
{{- if and $giscus.repo $giscus.repoId $giscus.categoryId -}}
<section class="comments">
  <h2>Comments</h2>
  <div id="giscus-container"></div>
  <script>
    (() => {
      const container = document.getElementById("giscus-container");
      if (!container || container.childElementCount > 0) {
        return;
      }

      const getGiscusTheme = () =>
        document.documentElement.dataset.theme === "dark" ? "dark" : "light";

      const script = document.createElement("script");
      script.src = "https://giscus.app/client.js";
      script.async = true;
      script.crossOrigin = "anonymous";
      script.setAttribute("data-repo", "{{ $giscus.repo }}");
      script.setAttribute("data-repo-id", "{{ $giscus.repoId }}");
      script.setAttribute("data-category", "{{ $giscus.category }}");
      script.setAttribute("data-category-id", "{{ $giscus.categoryId }}");
      script.setAttribute("data-mapping", "{{ $giscus.mapping | default "pathname" }}");
      script.setAttribute("data-strict", "{{ $giscus.strict | default "0" }}");
      script.setAttribute("data-reactions-enabled", "{{ $giscus.reactionsEnabled | default "1" }}");
      script.setAttribute("data-emit-metadata", "{{ $giscus.emitMetadata | default "0" }}");
      script.setAttribute("data-input-position", "{{ $giscus.inputPosition | default "bottom" }}");
      script.setAttribute("data-lang", "{{ $giscus.lang | default "zh-CN" }}");
      script.setAttribute("data-theme", getGiscusTheme());
      container.appendChild(script);

      const syncGiscusTheme = () => {
        const iframe = document.querySelector("iframe.giscus-frame");
        if (!iframe) {
          return;
        }

        iframe.contentWindow.postMessage(
          {
            giscus: {
              setConfig: {
                theme: getGiscusTheme(),
              },
            },
          },
          "https://giscus.app"
        );
      };

      const observer = new MutationObserver(syncGiscusTheme);
      observer.observe(document.documentElement, {
        attributes: true,
        attributeFilter: ["data-theme"],
      });

      window.addEventListener("load", syncGiscusTheme, { once: true });
    })();
  </script>
</section>
{{- end -}}
